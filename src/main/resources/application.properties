# 端口
server.port=8080
spring.profiles.active=dev

# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ai_intangible_cultural?serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8
#spring.datasource.url=jdbc:mysql://localhost:3306/ai_intangible_cultural?characterEncoding=utf8&useSSL=false
spring.datasource.username=ai_intangible_cultural
spring.datasource.password=ai_intangible_cultural


# 数据库配置
#spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
#spring.datasource.url=jdbc:sqlserver://localhost:1433;DatabaseName=ai_intangible_cultural;encrypt=true;trustServerCertificate=true
#spring.datasource.username=sa
#spring.datasource.password=123456

spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=18000000
spring.datasource.hikari.connection-test-query=select 1
spring.datasource.hikari.validation-timeout=250
#日志
logging.level.com.codeying=debug

#上传文件：取消tomcat最大限制，改成1G
server.tomcat.max-swallow-size=-1
spring.servlet.multipart.max-request-size=1000485760
spring.servlet.multipart.max-file-size=1000485760


logging.level.com.codeying.mapper.ChatMapper: WARN
mybatis-plus.mapper-locations=classpath*:mapper/*.xml



