# public config
langchain4j.open-ai.api-key=
langchain4j.open-ai.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1

# Chat Model
langchain4j.open-ai.chat-model.base-url=${langchain4j.open-ai.base-url}
langchain4j.open-ai.chat-model.api-key=${langchain4j.open-ai.api-key}
langchain4j.open-ai.chat-model.model-name=qwen-plus
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# Streaming Chat Model
langchain4j.open-ai.streaming-chat-model.base-url=${langchain4j.open-ai.base-url}
langchain4j.open-ai.streaming-chat-model.api-key=${langchain4j.open-ai.api-key}
langchain4j.open-ai.streaming-chat-model.model-name=qwen-plus
langchain4j.open-ai.streaming-chat-model.log-requests=true
langchain4j.open-ai.streaming-chat-model.log-responses=true

# Embedding Model
langchain4j.open-ai.embedding-model.base-url=${langchain4j.open-ai.base-url}
langchain4j.open-ai.embedding-model.api-key=${langchain4j.open-ai.api-key}
langchain4j.open-ai.embedding-model.model-name=text-embedding-v3
langchain4j.open-ai.embedding-model.log-requests=true
langchain4j.open-ai.embedding-model.log-responses=true
langchain4j.open-ai.embedding-model.max-segments-per-batch=10